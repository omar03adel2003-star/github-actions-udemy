name: Docker Build & Slack Alert

on:
  push:
    branches: [ "main", "master" ]

env:
  # اسم الصورة لازم حروف صغيرة ومن غير إيموجي
  IMAGE_NAME: my-ids-app

jobs:
  build-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }} .

      - name: Send Notification to Slack 📩
        # السطر ده بيخلي التنبيه يتبعت حتى لو الخطوات اللي فوق فشلت
        if: always() 
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_CHANNEL: '#general' # تأكد إن القناة دي موجودة في Abo 3mera
          SLACK_ICON_EMOJI: ':rocket:'
          SLACK_USERNAME: 'GitHub Actions'
          SLACK_MESSAGE: 'Docker Build Finished! Status: ${{ job.status }} 🚀'
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}